<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOS Game - Odaya Katıl</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0F0F1A; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .card {
      background: #1A1A2E; border: 1px solid #2A2A4A;
      border-radius: 24px; padding: 40px 32px;
      text-align: center; max-width: 360px; width: 100%;
    }
    .logo { display: flex; gap: 6px; justify-content: center; margin-bottom: 24px; }
    .logo-tile { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; }
    .s1 { background: #2D1B4E; color: #C084FC; }
    .o  { background: #0F2A3A; color: #22D3EE; }
    .s2 { background: #0F2A1A; color: #4ADE80; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p  { color: #888; font-size: 14px; margin-bottom: 24px; }
    .code { background: #0F0F1A; border: 1px solid #C084FC44; border-radius: 12px; padding: 16px; font-size: 32px; font-weight: 800; letter-spacing: 8px; color: #C084FC; margin-bottom: 24px; }
    .btn { display: block; background: #7C3AED; color: #fff; text-decoration: none; padding: 16px; border-radius: 16px; font-size: 16px; font-weight: 600; margin-bottom: 12px; cursor: pointer; border: none; width: 100%; }
    .store-links { display: flex; gap: 12px; margin-top: 16px; }
    .store-btn { flex: 1; background: #1A1A2E; border: 1px solid #2A2A4A; border-radius: 12px; padding: 12px; text-align: center; text-decoration: none; color: #888; font-size: 12px; }
    .hint { color: #555; font-size: 12px; margin-top: 12px; }
  </style>
  <script>
    var roomId = '';

    window.onload = function() {
      var params = new URLSearchParams(window.location.search);
      roomId = (params.get('kod') || params.get('room') || '').toUpperCase();

      if (roomId && roomId.length === 6) {
        document.getElementById('room-code').textContent = roomId;
      } else {
        document.getElementById('room-code').textContent = '??????';
        document.getElementById('open-btn').disabled = true;
        document.getElementById('open-btn').textContent = 'Geçersiz Kod';
      }
    };

    function openApp() {
      if (!roomId) return;
      // iframe trick - sayfayı değiştirmeden uygulamayı aç
      var iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.src = 'sosgame://join/' + roomId;
      document.body.appendChild(iframe);
      setTimeout(function() {
        document.body.removeChild(iframe);
      }, 2000);
    }
  </script>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-tile s1">S</div>
      <div class="logo-tile o">O</div>
      <div class="logo-tile s2">S</div>
    </div>
    <h1>Seni Oyuna Davet Etti!</h1>
    <p>Oda kodu ile SOS Game uygulamasına katıl</p>
    <div class="code" id="room-code">------</div>
    <button class="btn" id="open-btn" onclick="openApp()">📱 Uygulamada Aç</button>
    <p class="hint">Uygulama açılmadıysa yüklü olmayabilir</p>
    <div class="store-links">
      <a class="store-btn" href="https://play.google.com/store/apps/details?id=com.slafiy.sosgame">🤖 Google Play</a>
      <a class="store-btn" href="https://apps.apple.com/app/id0000000000">🍎 App Store</a>
    </div>
  </div>
</body>
</html>
